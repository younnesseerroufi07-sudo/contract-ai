<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContractAI - تحليل العقود بالذكاء الاصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; } </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center font-bold text-lg">C</div>
                <span class="text-xl font-bold">ContractAI</span>
            </div>
            <button onclick="alert('سنربطها بـ Stripe')" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-500 rounded-xl">الاشتراك 2000€/سنة</button>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-3xl mx-auto px-6 py-16 flex-grow w-full">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold mb-4">حلل عقودك القانونية في <span class="text-indigo-400">ثواني</span></h1>
            <p class="text-slate-400">ارفع العقد PDF أو DOCX وسيعطيك الذكاء الاصطناعي ملخص + المخاطر + التوصيات</p>
        </div>

        <!-- Upload Form -->
        <div class="bg-slate-900 border-slate-800 rounded-2xl p-8 shadow-2xl">
            <form id="uploadForm">
                <label class="block text-sm font-medium mb-2">ارفع العقد</label>
                <input type="file" id="contractFile" accept=".pdf,.docx,.txt" required class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-indigo-600 file:text-white hover:file:bg-indigo-500"/>
                <button type="submit" id="btn" class="w-full mt-6 py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-500">تحليل العقد الآن</button>
            </form>

            <!-- Result -->
            <div id="result" class="mt-8 hidden">
                <h3 class="font-bold text-lg mb-3">نتيجة التحليل</h3>
                <div class="bg-slate-950 p-4 rounded-xl border-slate-800">
                    <p><b>نوع العقد:</b> <span id="type"></span></p>
                    <p><b>نسبة المخاطر:</b> <span id="risk"></span>/100</p>
                    <p class="mt-2"><b>الملخص:</b> <span id="summary"></span></p>
                    <p class="mt-2 text-xs text-slate-500">تنبيه: هذا ليس استشارة قانونية</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-900 py-6 text-center text-xs text-slate-500">
        &copy; 2026 ContractAI. All rights reserved.
    </footer>

<script>
const API_URL = "http://localhost:8000"; // بدلها بالرابط ديال السيرفر

document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const file = document.getElementById('contractFile').files[0];
    if(!file) return alert("اختر ملف");

    btn.innerText = "جاري التحليل...";
    btn.disabled = true;

    const formData = new FormData();
    formData.append('contractFile', file);
    formData.append('userId', 'demo-user');

    try {
        // هذا هو الربط مع السيرفر FastAPI اللي عطيتك الكود ديالو
        const res = await fetch(`${API_URL}/api/contracts/analyze-contract`, {
            method: 'POST',
            body: formData
        });
        const data = await res.json();

        document.getElementById('type').innerText = data.analysis.contract_type;
        document.getElementById('risk').innerText = data.analysis.risk_score;
        document.getElementById('summary').innerText = data.analysis.summary;
        document.getElementById('result').classList.remove('hidden');

    } catch (err) {
        alert("خطأ: تأكد ان السيرفر خدام على http://localhost:8000");
        console.error(err);
    }
    btn.innerText = "تحليل العقد الآن";
    btn.disabled = false;
});
</script>
</body>
</html>
